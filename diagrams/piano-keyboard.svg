<text x="60" y="627" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#444">Every major scale follows the same W-W-H-W-W-W-H pattern of semitone steps. Start on a different note, you get a different major scale (G major, D major, …) — same shape, different position.</text>
<text x="60" y="645" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#444">Frequency formula: <tspan font-family="Menlo, monospace" font-size="13" fill="#0a6">freq(midi) = 440 * 2 ^ ((midi - 69) / 12)</tspan>. Each semitone multiplies frequency by the 12th root of 2 (~1.0595).</text>
</svg>
