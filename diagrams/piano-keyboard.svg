<text x="585.0" y="38" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#222">A piano keyboard, with note names, MIDI numbers, and frequencies</text>
<text x="585.0" y="62" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#555">Two octaves, C3 to C5. The pattern of 7 white + 5 black keys repeats forever.</text>
<text x="585.0" y="80" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#888">An octave = 12 semitones = doubling of frequency.</text>
<text x="585.0" y="98" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#888">A semitone = the smallest step on a piano (one key to the next, white or black).</text>
