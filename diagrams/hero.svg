<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">sand-sim: same window, three releases</title>
  <desc id="heroDesc">Three side-by-side panels showing the project's evolution. v0.1 is a sandbox with a sand pile and a water reservoir. v0.2 is a chemistry set with fire spreading through wood and steam rising. v1.0 is an alchemy game with a codex grid of discovered and locked elements.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="fireGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#ff3300"/>
    </linearGradient>
    <linearGradient id="lavaGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff3300"/>
      <stop offset="100%" stop-color="#ff7733"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- ============ PANEL 1: v0.1 Sandbox ============ -->
  <g transform="translate(30,40)">
    <rect width="360" height="320" rx="10" fill="#11161e" stroke="#2d3748" stroke-width="2"/>
    <!-- title bar -->
    <rect width="360" height="28" rx="10" fill="#1c232e"/>
    <rect y="14" width="360" height="14" fill="#1c232e"/>
    <circle cx="14" cy="14" r="4" fill="#ff5f56"/>
    <circle cx="28" cy="14" r="4" fill="#ffbd2e"/>
    <circle cx="42" cy="14" r="4" fill="#27c93f"/>
    <text x="180" y="19" text-anchor="middle" font-family="Menlo,monospace" font-size="11" fill="#8b949e">sand-sim · v0.1 · 60fps</text>

    <!-- play area: 340 x 270, starting at (10, 40) -->
    <g transform="translate(10,40)">
      <rect width="340" height="270" fill="#0a0d12"/>

      <!-- stone walls forming a water reservoir on the right -->
      <g fill="#6b7280">
        <rect x="200" y="170" width="6" height="100"/>
        <rect x="206" y="240" width="120" height="6"/>
        <rect x="320" y="170" width="6" height="76"/>
      </g>
      <!-- water in reservoir -->
      <g fill="#4a90e2">
        <rect x="207" y="200" width="113" height="40"/>
      </g>
      <!-- water surface wobble -->
      <g fill="#62a5f0">
        <rect x="210" y="196" width="20" height="4"/>
        <rect x="240" y="198" width="30" height="2"/>
        <rect x="280" y="196" width="35" height="4"/>
      </g>

      <!-- sand pile on the left, triangular -->
      <g fill="#e6c170">
        <!-- base row -->
        <rect x="10" y="262" width="180" height="8"/>
        <rect x="20" y="254" width="160" height="8"/>
        <rect x="30" y="246" width="140" height="8"/>
        <rect x="40" y="238" width="120" height="8"/>
        <rect x="50" y="230" width="100" height="8"/>
        <rect x="62" y="222" width="76" height="8"/>
        <rect x="72" y="214" width="56" height="8"/>
        <rect x="82" y="206" width="36" height="8"/>
        <rect x="90" y="198" width="20" height="8"/>
      </g>
      <!-- highlights on sand for that pixel-art feel -->
      <g fill="#f0d590">
        <rect x="70" y="222" width="8" height="4"/>
        <rect x="100" y="206" width="8" height="4"/>
        <rect x="140" y="238" width="8" height="4"/>
      </g>

      <!-- falling sand pixels (animated) -->
      <g fill="#e6c170">
        <rect x="98" y="0" width="6" height="6">
          <animate attributeName="y" values="0;190" dur="1.8s" repeatCount="indefinite"/>
        </rect>
        <rect x="110" y="0" width="6" height="6">
          <animate attributeName="y" values="-40;200" dur="1.8s" repeatCount="indefinite"/>
        </rect>
        <rect x="92" y="0" width="6" height="6">
          <animate attributeName="y" values="-80;200" dur="1.8s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- mouse cursor hint -->
      <g transform="translate(96,40)">
        <circle r="12" fill="none" stroke="#f0c674" stroke-width="1" opacity="0.5">
          <animate attributeName="r" values="8;14;8" dur="1.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- HUD legend bottom-right corner -->
      <g font-family="Menlo,monospace" font-size="9">
        <text x="240" y="14" fill="#e6c170">1 SAND</text>
        <text x="240" y="26" fill="#4a90e2">2 WATER</text>
        <text x="240" y="38" fill="#6b7280">3 STONE</text>
      </g>
    </g>

    <!-- caption -->
    <text x="180" y="305" text-anchor="middle" font-family="Inter,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#e6c170">Month 1 — Sandbox</text>
  </g>

  <!-- ============ PANEL 2: v0.2 Chemistry ============ -->
  <g transform="translate(420,40)">
    <rect width="360" height="320" rx="10" fill="#11161e" stroke="#2d3748" stroke-width="2"/>
    <rect width="360" height="28" rx="10" fill="#1c232e"/>
    <rect y="14" width="360" height="14" fill="#1c232e"/>
    <circle cx="14" cy="14" r="4" fill="#ff5f56"/>
    <circle cx="28" cy="14" r="4" fill="#ffbd2e"/>
    <circle cx="42" cy="14" r="4" fill="#27c93f"/>
    <text x="180" y="19" text-anchor="middle" font-family="Menlo,monospace" font-size="11" fill="#8b949e">sand-sim · v0.2 · 60fps</text>

    <g transform="translate(10,40)">
      <rect width="340" height="270" fill="#0a0d12"/>

      <!-- stone bowl bottom-left holding water that's being heated -->
      <g fill="#6b7280">
        <rect x="20" y="200" width="6" height="60"/>
        <rect x="26" y="254" width="100" height="6"/>
        <rect x="120" y="200" width="6" height="60"/>
      </g>
      <g fill="#4a90e2">
        <rect x="27" y="220" width="92" height="34"/>
      </g>

      <!-- lava pool bottom-right -->
      <g fill="url(#lavaGrad)">
        <rect x="180" y="244" width="150" height="16"/>
      </g>
      <g fill="#ffaa55">
        <rect x="200" y="240" width="20" height="4"/>
        <rect x="240" y="240" width="30" height="4"/>
        <rect x="290" y="240" width="20" height="4"/>
      </g>

      <!-- wood log getting eaten by fire, centre -->
      <g fill="#8b4513">
        <rect x="130" y="170" width="80" height="14"/>
        <rect x="130" y="184" width="80" height="14"/>
      </g>
      <g fill="#a0522d">
        <rect x="135" y="172" width="6" height="2"/>
        <rect x="155" y="180" width="6" height="2"/>
        <rect x="175" y="186" width="6" height="2"/>
        <rect x="195" y="190" width="6" height="2"/>
      </g>

      <!-- fire on right end of log, flickering -->
      <g fill="url(#fireGrad)">
        <rect x="190" y="150" width="14" height="20">
          <animate attributeName="height" values="20;30;18;26;20" dur="0.8s" repeatCount="indefinite"/>
          <animate attributeName="y" values="150;140;152;144;150" dur="0.8s" repeatCount="indefinite"/>
        </rect>
        <rect x="200" y="140" width="10" height="30">
          <animate attributeName="height" values="30;20;34;24;30" dur="0.7s" repeatCount="indefinite"/>
          <animate attributeName="y" values="140;150;136;146;140" dur="0.7s" repeatCount="indefinite"/>
        </rect>
        <rect x="180" y="160" width="8" height="10">
          <animate attributeName="height" values="10;16;8;14;10" dur="0.6s" repeatCount="indefinite"/>
          <animate attributeName="y" values="160;154;162;156;160" dur="0.6s" repeatCount="indefinite"/>
        </rect>
      </g>
      <!-- spark embers -->
      <g fill="#ffe066">
        <rect x="196" y="100" width="3" height="3" opacity="0.8">
          <animate attributeName="y" values="160;30" dur="1.6s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.9;0" dur="1.6s" repeatCount="indefinite"/>
        </rect>
        <rect x="210" y="80" width="3" height="3">
          <animate attributeName="y" values="160;20" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.9;0" dur="2s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- steam rising from the heated bowl -->
      <g fill="#c8d4e0" opacity="0.7">
        <rect x="50" y="180" width="6" height="6">
          <animate attributeName="y" values="220;20" dur="3s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.9;0" dur="3s" repeatCount="indefinite"/>
        </rect>
        <rect x="70" y="160" width="6" height="6">
          <animate attributeName="y" values="220;10" dur="3.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.9;0" dur="3.5s" repeatCount="indefinite"/>
        </rect>
        <rect x="95" y="140" width="6" height="6">
          <animate attributeName="y" values="220;0" dur="4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.9;0" dur="4s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- HUD: heat-map toggle indicator -->
      <g font-family="Menlo,monospace" font-size="9">
        <text x="240" y="14" fill="#ff6b35">F FIRE</text>
        <text x="240" y="26" fill="#8b4513">W WOOD</text>
        <text x="240" y="38" fill="#1a0e0e">O OIL</text>
        <text x="240" y="50" fill="#c8d4e0">S STEAM</text>
        <text x="240" y="62" fill="#ff3300">L LAVA</text>
        <text x="240" y="74" fill="#66ff33">A ACID</text>
      </g>
    </g>

    <text x="180" y="305" text-anchor="middle" font-family="Inter,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#ff6b35">Month 2 — Chemistry</text>
  </g>

  <!-- ============ PANEL 3: v1.0 Alchemy game (codex) ============ -->
  <g transform="translate(810,40)">
    <rect width="360" height="320" rx="10" fill="#11161e" stroke="#2d3748" stroke-width="2"/>
    <rect width="360" height="28" rx="10" fill="#1c232e"/>
    <rect y="14" width="360" height="14" fill="#1c232e"/>
    <circle cx="14" cy="14" r="4" fill="#ff5f56"/>
    <circle cx="28" cy="14" r="4" fill="#ffbd2e"/>
    <circle cx="42" cy="14" r="4" fill="#27c93f"/>
    <text x="180" y="19" text-anchor="middle" font-family="Menlo,monospace" font-size="11" fill="#8b949e">sand-sim · v1.0 · CODEX</text>

    <g transform="translate(10,40)">
      <rect width="340" height="270" fill="#0a0d12"/>
      <text x="170" y="22" text-anchor="middle" font-family="Menlo,monospace" font-size="12" font-weight="bold" fill="#f0c674">CODEX</text>
      <text x="170" y="38" text-anchor="middle" font-family="Menlo,monospace" font-size="9" fill="#8b949e">9 / 13 discovered · TAB to close</text>

      <!-- 4-col x 3-row grid of tiles, each 76 wide x 60 tall, gap 6, starting at (10, 52) -->
      <!-- ROW 1 -->
      <g font-family="Menlo,monospace" font-size="9">
        <!-- Sand: known -->
        <g transform="translate(10,52)">
          <rect width="76" height="60" rx="4" fill="#1a1f2e" stroke="#e6c170"/>
          <rect x="16" y="14" width="44" height="22" fill="#e6c170"/>
          <text x="38" y="50" text-anchor="middle" fill="#e6c170">SAND</text>
        </g>
        <!-- Water -->
        <g transform="translate(92,52)">
          <rect width="76" height="60" rx="4" fill="#1a1f2e" stroke="#4a90e2"/>
          <rect x="16" y="14" width="44" height="22" fill="#4a90e2"/>
          <text x="38" y="50" text-anchor="middle" fill="#4a90e2">WATER</text>
        </g>
        <!-- Stone -->
        <g transform="translate(174,52)">
          <rect width="76" height="60" rx="4" fill="#1a1f2e" stroke="#6b7280"/>
          <rect x="16" y="14" width="44" height="22" fill="#6b7280"/>
          <text x="38" y="50" text-anchor="middle" fill="#6b7280">STONE</text>
        </g>
        <!-- Fire -->
        <g transform="translate(256,52)">
          <rect width="76" height="60" rx="4" fill="#1a1f2e" stroke="#ff6b35"/>
          <rect x="16" y="14" width="44" height="22" fill="url(#fireGrad)"/>
          <text x="38" y="50" text-anchor="middle" fill="#ff6b35">FIRE</text>
        </g>

        <!-- ROW 2 -->
        <g transform="translate(10,118)">
          <rect width="76" height="60" rx="4" fill="#1a1f2e" stroke="#8b4513"/>
          <rect x="16" y="14" width="44" height="22" fill="#8b4513"/>
          <text x="38" y="50" text-anchor="middle" fill="#8b4513">WOOD</text>
        </g>
        <g transform="translate(92,118)">
          <rect width="76" height="60" rx="4" fill="#1a1f2e" stroke="#c8d4e0"/>
          <rect x="16" y="14" width="44" height="22" fill="#c8d4e0"/>
          <text x="38" y="50" text-anchor="middle" fill="#c8d4e0">STEAM</text>
        </g>
        <!-- Locked tile: GLASS -->
        <g transform="translate(174,118)">
          <rect width="76" height="60" rx="4" fill="#1a1f2e" stroke="#2d3748"/>
          <rect x="16" y="14" width="44" height="22" fill="#2d3748"/>
          <text x="38" y="50" text-anchor="middle" fill="#4a5365">? ? ?</text>
          <text x="38" y="29" text-anchor="middle" fill="#4a5365" font-size="14">?</text>
        </g>
        <!-- Acid -->
        <g transform="translate(256,118)">
          <rect width="76" height="60" rx="4" fill="#1a1f2e" stroke="#66ff33"/>
          <rect x="16" y="14" width="44" height="22" fill="#66ff33"/>
          <text x="38" y="50" text-anchor="middle" fill="#66ff33">ACID</text>
        </g>

        <!-- ROW 3 -->
        <g transform="translate(10,184)">
          <rect width="76" height="60" rx="4" fill="#1a1f2e" stroke="#ff3300"/>
          <rect x="16" y="14" width="44" height="22" fill="url(#lavaGrad)"/>
          <text x="38" y="50" text-anchor="middle" fill="#ff3300">LAVA</text>
        </g>
        <!-- Locked: GUNPOWDER -->
        <g transform="translate(92,184)">
          <rect width="76" height="60" rx="4" fill="#1a1f2e" stroke="#2d3748"/>
          <rect x="16" y="14" width="44" height="22" fill="#2d3748"/>
          <text x="38" y="50" text-anchor="middle" fill="#4a5365">? ? ?</text>
          <text x="38" y="29" text-anchor="middle" fill="#4a5365" font-size="14">?</text>
        </g>
        <!-- Locked: RUST -->
        <g transform="translate(174,184)">
          <rect width="76" height="60" rx="4" fill="#1a1f2e" stroke="#2d3748"/>
          <rect x="16" y="14" width="44" height="22" fill="#2d3748"/>
          <text x="38" y="50" text-anchor="middle" fill="#4a5365">? ? ?</text>
          <text x="38" y="29" text-anchor="middle" fill="#4a5365" font-size="14">?</text>
        </g>
        <!-- OIL: known -->
        <g transform="translate(256,184)">
          <rect width="76" height="60" rx="4" fill="#1a1f2e" stroke="#1a0e0e"/>
          <rect x="16" y="14" width="44" height="22" fill="#1a0e0e"/>
          <text x="38" y="50" text-anchor="middle" fill="#8b6f47">OIL</text>
        </g>
      </g>

      <!-- celebratory highlight on a just-discovered tile -->
      <rect x="174" y="118" width="76" height="60" rx="4" fill="none" stroke="#f0c674" stroke-width="2" opacity="0">
        <animate attributeName="opacity" values="0;1;0;1;0" dur="2s" repeatCount="indefinite"/>
      </rect>
    </g>

    <text x="180" y="305" text-anchor="middle" font-family="Inter,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#f0c674">Month 3 — Alchemy Game</text>
  </g>

  <!-- arrows between panels -->
  <g fill="#3d4654" font-family="Inter,Helvetica,sans-serif" font-size="20" font-weight="bold">
    <text x="403" y="210">→</text>
    <text x="793" y="210">→</text>
  </g>
</svg>
