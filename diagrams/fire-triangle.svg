<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" role="img" aria-labelledby="ftTitle ftDesc">
  <title id="ftTitle">The fire triangle</title>
  <desc id="ftDesc">A triangular diagram with fuel, oxygen, and heat at each corner, and fire in the centre. Remove any corner and the fire goes out.</desc>

  <defs>
    <linearGradient id="ftBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="ftFire" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#ff3300"/>
    </linearGradient>
    <radialGradient id="ftGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff3300" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="340" fill="url(#ftBg)"/>

  <!-- Triangle, corners at: top (200,40), bottom-left (40,280), bottom-right (360,280) -->
  <polygon points="200,40 40,280 360,280" fill="none" stroke="#ff6b35" stroke-width="3" stroke-linejoin="round"/>

  <!-- centre glow + fire -->
  <ellipse cx="200" cy="200" rx="80" ry="60" fill="url(#ftGlow)"/>

  <!-- flame body, flickering -->
  <g transform="translate(200,200)">
    <path d="M -20 30 Q -25 0 -10 -20 Q 0 -35 10 -20 Q 25 0 20 30 Z" fill="url(#ftFire)">
      <animateTransform attributeName="transform" type="scale" values="1,1;1.1,1.15;0.95,0.9;1.05,1.1;1,1" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M -10 25 Q -12 5 -4 -10 Q 0 -18 4 -10 Q 12 5 10 25 Z" fill="#ffeb3b">
      <animate attributeName="opacity" values="0.7;1;0.6;0.9;0.7" dur="0.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Corner labels -->
  <!-- FUEL (top) -->
  <g transform="translate(200,40)">
    <circle r="22" fill="#1a0e0e" stroke="#e6c170" stroke-width="2"/>
    <text x="0" y="-35" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#e6c170" text-anchor="middle" font-weight="bold">FUEL</text>
    <text x="0" y="5" font-family="ui-sans-serif, system-ui" font-size="9" fill="#e6c170" text-anchor="middle">wood</text>
    <text x="0" y="16" font-family="ui-sans-serif, system-ui" font-size="9" fill="#e6c170" text-anchor="middle">oil</text>
  </g>

  <!-- OXYGEN (bottom-left) -->
  <g transform="translate(40,280)">
    <circle r="22" fill="#11161e" stroke="#4a90e2" stroke-width="2"/>
    <text x="-30" y="35" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#4a90e2" text-anchor="start" font-weight="bold">OXYGEN</text>
    <text x="0" y="-2" font-family="ui-sans-serif, system-ui" font-size="9" fill="#4a90e2" text-anchor="middle">21% of</text>
    <text x="0" y="9" font-family="ui-sans-serif, system-ui" font-size="9" fill="#4a90e2" text-anchor="middle">the air</text>
  </g>

  <!-- HEAT (bottom-right) -->
  <g transform="translate(360,280)">
    <circle r="22" fill="#11161e" stroke="#ff6b35" stroke-width="2"/>
    <text x="30" y="35" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#ff6b35" text-anchor="end" font-weight="bold">HEAT</text>
    <text x="0" y="-2" font-family="ui-sans-serif, system-ui" font-size="9" fill="#ff6b35" text-anchor="middle">spark</text>
    <text x="0" y="9" font-family="ui-sans-serif, system-ui" font-size="9" fill="#ff6b35" text-anchor="middle">match</text>
  </g>

  <!-- FIRE label -->
  <text x="200" y="265" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#ffeb3b" text-anchor="middle" font-weight="bold">FIRE</text>

  <!-- footer -->
  <text x="200" y="320" font-family="ui-sans-serif, system-ui" font-size="11" fill="#8b95a5" text-anchor="middle">all three sides required · remove one and the flame dies</text>
</svg>
