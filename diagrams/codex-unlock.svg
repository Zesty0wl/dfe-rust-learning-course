<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" role="img" aria-labelledby="codexTitle">
  <title id="codexTitle">A codex tile flipping from locked ??? to fully discovered — the Session 23 wow moment</title>

  <defs>
    <linearGradient id="bgCodex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="lavaCodex" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff3300"/>
      <stop offset="100%" stop-color="#ff7733"/>
    </linearGradient>
  </defs>

  <rect width="360" height="200" rx="8" fill="url(#bgCodex)" stroke="#2d3748"/>

  <text x="180" y="24" text-anchor="middle" font-family="Menlo,monospace" font-size="13" font-weight="bold" fill="#f0c674">Session 23 — The Codex Unlocks</text>

  <!-- Locked tile (left) -->
  <g transform="translate(40,60)">
    <rect width="100" height="100" rx="6" fill="#1a1f2e" stroke="#2d3748" stroke-width="2"/>
    <rect x="22" y="20" width="56" height="34" fill="#2d3748"/>
    <text x="50" y="42" text-anchor="middle" font-family="Menlo,monospace" font-size="20" font-weight="bold" fill="#4a5365">?</text>
    <text x="50" y="80" text-anchor="middle" font-family="Menlo,monospace" font-size="10" fill="#4a5365">? ? ?</text>
  </g>

  <!-- Arrow with sparkle -->
  <g transform="translate(170,100)">
    <text font-family="Inter,Helvetica,sans-serif" font-size="28" font-weight="bold" fill="#f0c674">
      →
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.2s" repeatCount="indefinite"/>
    </text>
    <!-- sparkle pixels -->
    <g fill="#f0c674">
      <rect x="-8" y="-30" width="3" height="3">
        <animate attributeName="opacity" values="0;1;0" dur="1.6s" repeatCount="indefinite"/>
      </rect>
      <rect x="30" y="-20" width="3" height="3">
        <animate attributeName="opacity" values="0;1;0" dur="1.4s" repeatCount="indefinite" begin="0.3s"/>
      </rect>
      <rect x="14" y="-44" width="3" height="3">
        <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
      </rect>
      <rect x="-6" y="20" width="3" height="3">
        <animate attributeName="opacity" values="0;1;0" dur="1.7s" repeatCount="indefinite" begin="0.4s"/>
      </rect>
    </g>
  </g>

  <!-- Discovered tile (right): GLASS -->
  <g transform="translate(220,60)">
    <rect width="100" height="100" rx="6" fill="#1a1f2e" stroke="#a3d4ff" stroke-width="2"/>
    <!-- glowing outline animation -->
    <rect width="100" height="100" rx="6" fill="none" stroke="#f0c674" stroke-width="3" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- glass pixel block with sheen -->
    <rect x="22" y="20" width="56" height="34" fill="#a3d4ff" opacity="0.7"/>
    <rect x="22" y="20" width="56" height="4" fill="#d4eaff"/>
    <rect x="22" y="48" width="56" height="2" fill="#7eb8e8"/>
    <rect x="30" y="26" width="6" height="20" fill="#d4eaff" opacity="0.6"/>
    <text x="50" y="80" text-anchor="middle" font-family="Menlo,monospace" font-size="10" font-weight="bold" fill="#a3d4ff">GLASS</text>
  </g>
</svg>
